<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Demo Jquery</title>
        <script src="https://code.jquery.com/jquery-3.5.0.js"></script>

        <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
        <script src="https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/jquerycsvtotable/jquery.csvToTable.js"></script>
    </head>
    <body>
        <h1>Jquery - Listado Instituciones Educativas</h1>
        <div id="CSVTable"></div>
        <p id="mensajeFinal"></p>
        <button type="submit" id="obtenerInformacion">
            Obtener información
        </button>
        <button type="submit" id="limpiarInformacion">
            Limpiar información
        </button>
    </body>
    <script>
        $(document).ready(function () {
            $("#obtenerInformacion").click(function () {
                var url =
                    "data/Listado-Instituciones-Educativas-distribuidas-por-zona-distrito-y-circuito.csv";
                $("#CSVTable").CSVToTable(url, { separator: "|" });
            });

            $("#limpiarInformacion").click(function () {
                $("#mensajeFinal").empty();
            });
        });
    </script>
</html>
