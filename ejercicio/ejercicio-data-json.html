<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Demo Jquery</title>
        <script src="https://code.jquery.com/jquery-3.5.0.js"></script>
    </head>
    <body>
        <h1>Ejemplo de Uso de Jquery</h1>
        <p id="mensajeFinal"></p>
        <button type="submit" id="obtenerInformacion">
            Obtener información
        </button>
        <button type="submit" id="limpiarInformacion">
            Limpiar información
        </button>
    </body>
    <script>
        $(document).ready(function () {
            var url =
                "https://raw.githubusercontent.com/taw-desarrollo-plataformas-web/oers/refs/heads/main/data_instituciones.json";
            $("#obtenerInformacion").click(function () {
                $.ajax({
                    dataType: "json",
                    url: url,
                }).then(function (data) {
                    for (var i = 0; i < data.length; i++) {
                        console.log(data[i]);
                        console.log(data[i].Code);
                        console.log(data[i].Name);
                        $("#mensajeFinal").append(
                            "<ul> <li> <b>AMIE:</b> " +
                                data[i].AMIE +
                                " <b>Provincia:</b> " +
                                data[i].Provincia +
                                " <b>Canton:</b> " +
                                data[i].Canton +
                                " <b>Parroquia:</b> " +
                                data[i].Parroquia +
                                " <b>Zona Administrativa:</b> " +
                                data[i].ZonaAdministrativa +
                                "</li> </ul>",
                        );
                    }
                });
            });

            $("#limpiarInformacion").click(function () {
                $("#mensajeFinal").empty();
            });
        });
    </script>
</html>
